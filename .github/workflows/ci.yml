name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: experiments
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: experiments
        run: python -m pytest tests/ -v --tb=short

      - name: Run demo
        working-directory: experiments
        run: python scripts/run_demo.py

  reproduce:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: experiments
        run: pip install -e ".[dev]"

      - name: Build benchmark
        working-directory: experiments
        run: python scripts/build_benchmark.py

      - name: Validate labels
        working-directory: experiments
        run: python scripts/validate_labels.py

      - name: Run detection evaluation
        working-directory: experiments
        run: python scripts/run_detector_eval.py

      - name: Run ablation
        working-directory: experiments
        run: python scripts/run_ablation.py

      - name: Run runtime red-team
        working-directory: experiments
        run: python scripts/run_runtime_redteam.py

      - name: Generate tables
        working-directory: experiments
        run: python scripts/make_tables.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: experiments/results/main/
