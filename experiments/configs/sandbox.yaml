sandbox:
  timeout_seconds: 30
  allowed_sinks:
    - stdout
    - stderr
  blocked_sinks:
    - network
    - file_write
    - shell
    - email
  mock_credentials:
    token: "MOCK_TOKEN_PLACEHOLDER"
    api_key: "MOCK_API_KEY_PLACEHOLDER"
  sinkhole_domains:
    - "*.sinkhole.test"
    - "*.example.invalid"
    - "127.0.0.1"
  synthetic_data:
    enabled: true
    max_size_mb: 10
